version: '3.8'

services:
  # PostgreSQL Database - Core data storage
  postgres:
    image: postgres:15-alpine
    container_name: constellation-postgres
    environment:
      POSTGRES_USER: constellation_user
      POSTGRES_PASSWORD: constellation_pass
      POSTGRES_DB: constellation_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../data/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constellation_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer for direct SQL access (optional visual interface)
  adminer:
    image: adminer
    container_name: constellation-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: constellation-network
