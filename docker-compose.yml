version: '3.8'

services:
  # PostgreSQL Database - Core data storage
  postgres:
    image: postgres:15-alpine
    container_name: constellation-postgres
    environment:
      POSTGRES_USER: constellation_user
      POSTGRES_PASSWORD: constellation_pass
      POSTGRES_DB: constellation_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constellation_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NocoDB - Database UI/Interface layer
  nocodb:
    image: nocodb/nocodb:latest
    container_name: constellation-nocodb
    environment:
      NC_ADMIN_PASSWORD: admin123
      # PostgreSQL connection string (NocoDB v7+ format)
      NC_DIALECT: postgresql
      NC_HOST: postgres
      NC_PORT: 5432
      NC_USER: constellation_user
      NC_PASS: constellation_pass
      NC_DB: constellation_db
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - nocodb_data:/home/noco/.nocodb

  # Optional: Adminer for direct SQL access (can disable if not needed)
  adminer:
    image: adminer
    container_name: constellation-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  nocodb_data:
    driver: local

# Network configuration for inter-service communication
networks:
  default:
    name: constellation-network
